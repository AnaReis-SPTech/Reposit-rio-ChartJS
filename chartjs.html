<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Atividade ChartJS</title>
</head>
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: rgb(231, 231, 231);
        font-family: Arial, Helvetica, sans-serif;  
    }

    #grafico_linhas, #grafico_barras {
        width: 30vw;
        height: auto;
    }

    .container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 2vw;
    }

    .content {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        border-radius: 20px;
        padding: 2% 0px 5% 0px;
        box-shadow: 5px 2px 10px rgba(0, 0, 0, 0.5);
        background-color: white;
        width: 70vw;
        height: 50vh;
        gap: 5%;
    }

    .content > div {
        transition: all ease-in-out 0.5s;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .content > div:hover {
        transform: scale(1.05);
    }

    .container > h1 {
        transition: all ease-in-out 0.5s;
    }

    .content > div > h2 {
        transition: all ease-in-out 0.5s;
    }

    .content > div > h2:hover {
        color: rgb(54, 162, 235);
        transform: scale(1.05);
    }

    .container > h1:hover {
        color: rgb(255, 98, 131);
        transform: scale(1.05);
    }

</style>

<body>
    <div class="container">
        <h1>Gráficos de Temperatura e Humidade</h1>
        <div class="content">
            <div>
                <h2>Gráfico de Linhas</h2>
                <canvas id="grafico_linhas"></canvas>
            </div>
            <div>
                <h2>Gráfico de Barras</h2>
                <canvas id="grafico_barras"></canvas>
            </div>
        </div>
    </div>
</body>

<script>
// ------ GRÁFICO DE LINHAS -----------------------------

    const labels = [
        '12:00',
        '13:00',
        '14:00',
        '15:00',
        '16:00',
        '17:00',
    ];


    const data = {
        labels: labels,
        datasets: [{
            label: 'Temperatura',
            backgroundColor: 'rgb(255, 98, 131)',
            borderColor: 'rgb(255, 98, 131)',
            data: [22, 24, 27, 23, 20, 18],
        },
        {
            label: 'Umidade',
            backgroundColor: 'rgb(54, 162, 235)',
            borderColor: 'rgb(54, 162, 235)',
            data: [90, 89, 93, 87, 88, 82],
        }

        ],
    };

    const config = {
        type: 'line',
        data: data,
    };

// ------ GRÁFICO DE BARRAS -----------------------------

    const labels2 = [
        'Janeiro',
        'Fevereiro',
        'Março',
        'Abril',
        'Maio',
        'Junho',
    ];


    const data2 = {
        labels: labels2,
        datasets: [{
            label: 'Temperatura Média',
            backgroundColor: 'rgb(255, 98, 131)',
            borderColor: 'rgb(255, 98, 131)',
            data: [22, 24, 27, 23, 20, 18],
        },
        {
            label: 'Umidade Média',
            backgroundColor: 'rgb(54, 162, 235)',
            borderColor: 'rgb(54, 162, 235)',
            data: [90, 89, 93, 87, 88, 82],
        }

        ],
    };


    const config2 = {
        type: 'bar',
        data: data2
    };

</script>

<script>
    const grafico_linhas = new Chart(
        document.getElementById('grafico_linhas'),
        config
    );

    const grafico_barras = new Chart(
        document.getElementById('grafico_barras'),
        config2
    );
</script>

</html>
